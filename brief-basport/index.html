<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mindlink Systems – Growth Systems Brief for Sports Dealmakers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#0a1e3f;background:linear-gradient(180deg,#f8fbff 0%,#eef4fc 100%);min-height:100vh}
.wrap{max-width:1200px;margin:0 auto;padding:0 40px}
.header{background:linear-gradient(135deg,#0a1e3f 0%,#1e4fd6 50%,#2563eb 100%);padding:48px 40px 80px;color:#fff;position:relative;overflow:hidden}
.header .orb1{position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%)}
.header .orb2{position:absolute;bottom:-120px;left:-120px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.15) 0%,transparent 70%)}
.header .inner{max-width:1200px;margin:0 auto;position:relative}
.header .brand{display:flex;align-items:center;gap:14px;margin-bottom:32px;font-size:13px;letter-spacing:2px;opacity:.9;text-transform:uppercase}
.header .brand img{height:40px;width:auto}
.header h1{font-size:52px;font-weight:700;line-height:1.05;margin-bottom:16px;letter-spacing:-1.2px}
.header .sub{font-size:19px;opacity:.88;max-width:780px;line-height:1.55;margin-bottom:20px;font-weight:300}
.header .cred{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px;opacity:.75;flex-wrap:wrap}
.header .cred .dot{width:4px;height:4px;border-radius:50%;background:#fcd34d}
.header .engaged{font-size:12.5px;opacity:.6;margin-bottom:32px;font-style:italic}
.header .badge{display:inline-flex;align-items:center;gap:10px;padding:12px 20px;background:rgba(255,255,255,.1);border-radius:12px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15);font-size:14px;font-weight:500}
.summary-bar{margin-top:-48px;position:relative;z-index:2}
.summary-card{background:#fff;border-radius:20px;padding:32px;box-shadow:0 20px 60px -20px rgba(10,30,63,.25);border:1px solid rgba(30,79,214,.08)}
.summary-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.summary-label{font-size:12px;letter-spacing:1.5px;color:#1e4fd6;font-weight:600;text-transform:uppercase;margin-bottom:6px}
.summary-title{font-size:22px;font-weight:700;color:#0a1e3f}
.curr-switch{display:flex;gap:6px;background:#f1f5fb;padding:4px;border-radius:10px}
.curr-btn{padding:8px 14px;border:none;background:transparent;color:#64748b;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.curr-btn.active{background:#1e4fd6;color:#fff}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.stat-low{padding:20px;border-radius:14px;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);border:1px solid #bfdbfe}
.stat-high{padding:20px;border-radius:14px;background:linear-gradient(135deg,#0a1e3f 0%,#1e4fd6 100%);color:#fff}
.stat-how{padding:20px;border-radius:14px;background:linear-gradient(135deg,#f8fafc 0%,#f1f5f9 100%);border:1px solid #e2e8f0}
.stat-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.stat-low .stat-label{color:#1e4fd6}
.stat-high .stat-label{opacity:.8}
.stat-how .stat-label{color:#1e4fd6}
.stat-val{font-size:32px;font-weight:700}
.stat-low .stat-val{color:#0a1e3f}
.section-label{font-size:12px;letter-spacing:2px;color:#1e4fd6;font-weight:600;text-transform:uppercase;margin-bottom:6px}
.section-title{font-size:32px;font-weight:700;margin-bottom:8px;letter-spacing:-.5px;color:#0a1e3f}
.section-sub{font-size:14.5px;color:#64748b;max-width:720px;line-height:1.55}
.market-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:20px}
.market-card{background:#fff;border-radius:16px;padding:28px;border:1px solid #e2e8f0;box-shadow:0 2px 12px -4px rgba(10,30,63,.06)}
.market-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#0a1e3f 0%,#1e4fd6 100%);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.market-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.market-num{font-size:13px;font-weight:700;color:#0a1e3f}
.market-card p{font-size:13.5px;color:#475569;line-height:1.55}
.market-src{font-size:10px;color:#94a3b8;margin-top:10px;font-weight:600}
.insight-bar{background:linear-gradient(135deg,#0a1e3f 0%,#1e4fd6 100%);border-radius:16px;padding:28px;color:#fff;position:relative;overflow:hidden}
.insight-bar .orb{position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%)}
.insight-inner{position:relative;min-width:280px}
.insight-tag{font-size:11px;letter-spacing:1.5px;color:#fcd34d;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.insight-bar h3{font-size:22px;font-weight:700;margin-bottom:8px}
.insight-bar p{font-size:14.5px;opacity:.88;line-height:1.55;max-width:640px}
.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.case-card{background:#fff;border-radius:16px;padding:28px;border:1px solid #e2e8f0;box-shadow:0 2px 12px -4px rgba(10,30,63,.06)}
.case-tag{font-size:11px;letter-spacing:1.5px;color:#1e4fd6;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.case-card h3{font-size:19px;font-weight:700;margin-bottom:4px;color:#0a1e3f}
.case-industry{font-size:13px;color:#64748b;margin-bottom:18px}
.case-label{font-size:11px;font-weight:700;letter-spacing:1px;color:#64748b;text-transform:uppercase;margin-bottom:4px}
.case-card .desc{font-size:13.5px;color:#334155;line-height:1.55;margin-bottom:14px}
.case-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid #e2e8f0}
.case-stat-light{padding:12px;border-radius:10px;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);border:1px solid #bfdbfe}
.case-stat-dark{padding:12px;border-radius:10px;background:linear-gradient(135deg,#0a1e3f 0%,#1e4fd6 100%);color:#fff}
.case-stat-val{font-size:20px;font-weight:700;line-height:1}
.case-stat-label{font-size:11px;margin-top:4px}
.case-stat-light .case-stat-label{color:#1e4fd6}
.case-stat-dark .case-stat-label{opacity:.85}
.demo-bar{text-decoration:none;display:block}
.demo-inner{background:linear-gradient(135deg,#0a1e3f 0%,#1e4fd6 100%);border-radius:16px;padding:28px;color:#fff;position:relative;overflow:hidden;cursor:pointer}
.demo-inner .orb{position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%)}
.demo-flex{position:relative;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.demo-flex .left{flex:1;min-width:280px}
.demo-tag{font-size:11px;letter-spacing:1.5px;color:#fcd34d;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.demo-inner h3{font-size:22px;font-weight:700;margin-bottom:8px}
.demo-inner p{font-size:14.5px;opacity:.88;line-height:1.55;max-width:640px}
.demo-btn{display:flex;align-items:center;gap:8px;padding:12px 20px;background:#fff;color:#0a1e3f;border-radius:10px;font-size:14px;font-weight:700;flex-shrink:0}
.opp-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.opp-header h2{font-size:36px;font-weight:700;letter-spacing:-.5px}
.opp-header .right{font-size:14px;color:#64748b;max-width:320px}
.opp-card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 4px 24px -8px rgba(10,30,63,.08);border:1px solid #e2e8f0;position:relative;overflow:hidden;margin-bottom:24px}
.opp-card .accent{position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,#1e4fd6 0%,#2563eb 100%)}
.opp-grid{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:40px}
.opp-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#0a1e3f 0%,#1e4fd6 100%);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.opp-top{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.opp-meta{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.opp-fix{font-size:11px;letter-spacing:1.5px;color:#64748b;font-weight:600}
.opp-priority{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:#d1fae5;color:#059669;letter-spacing:1px}
.opp-card h3{font-size:22px;font-weight:700;color:#0a1e3f;line-height:1.25}
.opp-bullets{list-style:none;display:flex;flex-direction:column;gap:14px}
.opp-bullets li{display:flex;gap:14px;align-items:flex-start}
.opp-dot{flex-shrink:0;margin-top:7px;width:6px;height:6px;border-radius:50%;background:#1e4fd6}
.opp-bullets p{font-size:14.5px;line-height:1.6;color:#334155}
.opp-bullets strong{color:#0a1e3f;font-weight:700}
.metrics-box{background:linear-gradient(135deg,#f8fafc 0%,#eff6ff 100%);border-radius:14px;padding:22px;margin-bottom:16px;border:1px solid #e2e8f0}
.metrics-title{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#0a1e3f;text-transform:uppercase;margin-bottom:14px}
.metric-row{margin-bottom:14px}
.metric-row:last-child{margin-bottom:0}
.metric-label{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.metric-label span{font-size:12px;color:#64748b}
.metric-vals{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.metric-before{color:#94a3b8;text-decoration:line-through}
.metric-arrow{color:#1e4fd6}
.metric-after{color:#0a1e3f}
.roi-box{background:linear-gradient(135deg,#0a1e3f 0%,#1e4fd6 100%);border-radius:14px;padding:22px;color:#fff}
.roi-title{font-size:11px;font-weight:700;letter-spacing:1.5px;opacity:.75;text-transform:uppercase;margin-bottom:12px}
.roi-row{display:flex;justify-content:space-between;margin-bottom:10px}
.roi-row span:first-child{font-size:12px;opacity:.8}
.roi-row span:last-child{font-size:16px;font-weight:700}
.roi-row .payback{color:#fcd34d}
.roi-divider{padding-top:10px;border-top:1px solid rgba(255,255,255,.15);margin-bottom:12px}
.roi-basis{padding-top:12px;border-top:1px solid rgba(255,255,255,.15);font-size:11.5px;line-height:1.5;opacity:.7;font-style:italic}
.how-section{background:linear-gradient(135deg,#0a1e3f 0%,#1e4fd6 100%);border-radius:20px;padding:44px;color:#fff;position:relative;overflow:hidden}
.how-section .orb{position:absolute;top:-80px;right:-80px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%)}
.how-inner{position:relative}
.how-label{font-size:12px;letter-spacing:2px;opacity:.75;font-weight:600;text-transform:uppercase;margin-bottom:6px}
.how-section h2{font-size:28px;font-weight:700;margin-bottom:28px;letter-spacing:-.4px}
.how-steps{display:flex;flex-direction:column;gap:22px;max-width:820px}
.how-step{display:flex;gap:18px;align-items:flex-start}
.how-num{flex-shrink:0;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fcd34d}
.how-step .title{font-size:17px;font-weight:600;margin-bottom:4px}
.how-step p{font-size:14.5px;line-height:1.6;opacity:.85}
.diff-section{background:#fff;border-radius:20px;padding:40px;border:1px solid #e2e8f0}
.diff-label{font-size:12px;letter-spacing:2px;color:#1e4fd6;font-weight:600;text-transform:uppercase;margin-bottom:6px}
.diff-section>h2{font-size:28px;font-weight:700;margin-bottom:32px;color:#0a1e3f;letter-spacing:-.4px}
.diff-item h3{font-size:19px;font-weight:700;margin-bottom:10px;color:#0a1e3f}
.diff-item p{font-size:15px;line-height:1.65;color:#475569}
.diff-divider{height:1px;background:#e2e8f0;margin:32px 0}
.method-section{background:#fff;border-radius:20px;padding:36px;border:1px solid #e2e8f0}
.method-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
.method-item .icon-title{display:flex;align-items:center;gap:10px;margin-bottom:10px;color:#1e4fd6}
.method-item strong{font-size:14px;color:#0a1e3f}
.method-item p{font-size:13.5px;color:#475569;line-height:1.6}
.pricing-section{background:#fff;border-radius:20px;padding:40px;border:2px solid #1e4fd6;position:relative;overflow:hidden}
.pricing-section .orb{position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(30,79,214,.06) 0%,transparent 70%)}
.pricing-grid{position:relative;display:grid;grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:40px;align-items:center}
.pricing-tag{font-size:12px;letter-spacing:2px;color:#1e4fd6;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.pricing-section h2{font-size:26px;font-weight:700;margin-bottom:14px;color:#0a1e3f;letter-spacing:-.4px}
.pricing-section .desc{font-size:15px;color:#475569;line-height:1.6;margin-bottom:14px}
.pricing-section .credit{font-size:14px;color:#64748b;line-height:1.6;font-style:italic}
.pricing-box{background:linear-gradient(135deg,#f8fafc 0%,#eff6ff 100%);border-radius:14px;padding:28px;border:1px solid #e2e8f0}
.pricing-box .inv-label{font-size:11px;letter-spacing:1.5px;color:#64748b;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.pricing-box .price{font-size:32px;font-weight:700;color:#0a1e3f;line-height:1.1;margin-bottom:4px}
.pricing-box .price-inr{font-size:14px;color:#64748b;margin-bottom:16px}
.pricing-details{padding-top:16px;border-top:1px solid #e2e8f0;font-size:13px;color:#475569;line-height:1.6}
.pricing-details strong{color:#0a1e3f}
.sources-section{background:#f8fafc;border-radius:16px;padding:28px;border:1px solid #e2e8f0}
.sources-label{font-size:11px;letter-spacing:2px;color:#64748b;font-weight:700;text-transform:uppercase;margin-bottom:14px}
.sources-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;font-size:12.5px;line-height:1.55;color:#475569}
.sources-grid strong{color:#0a1e3f}
.footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;font-size:12px;color:#94a3b8;padding:40px 0}
.footer .left{display:flex;align-items:center;gap:12px}
.footer img{height:28px;width:auto;opacity:.7}
svg.icon{display:inline-block;vertical-align:middle}
@media(max-width:768px){
  .header h1{font-size:32px}
  .opp-grid{grid-template-columns:1fr}
  .case-grid{grid-template-columns:1fr}
  .pricing-grid{grid-template-columns:1fr}
  .wrap{padding:0 20px}
  .header{padding:32px 20px 60px}
}
</style>
</head>

function fmt(usd){
  const v=usd*rates[currency];
  if(currency==='INR'){
    if(v>=10000000)return symbols[currency]+(v/10000000).toFixed(1)+' Cr';
    if(v>=100000)return symbols[currency]+(v/100000).toFixed(1)+' L';
    return symbols[currency]+Math.round(v).toLocaleString('en-IN');
  }
  if(v>=1000)return symbols[currency]+Math.round(v/1000)+'k';
  return symbols[currency]+Math.round(v);
}
