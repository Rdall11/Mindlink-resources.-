<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindlink Artifact Publisher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #c8f135;
    --accent-dim: rgba(200, 241, 53, 0.12);
    --text: #f0f0f0;
    --muted: #666;
    --error: #ff4d4d;
    --success: #c8f135;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container { width: 100%; max-width: 620px; }

  .header { margin-bottom: 36px; }

  .logo {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }

  h1 { font-size: 28px; font-weight: 800; line-height: 1.1; color: var(--text); }
  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
  }

  .card-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }

  input:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: #333; }
  textarea { height: 180px; line-height: 1.5; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .token-wrap { position: relative; }
  .token-wrap input { padding-right: 80px; }

  .token-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    padding: 4px 6px;
    transition: color 0.2s;
  }

  .token-toggle:hover { color: var(--accent); }

  .publish-btn {
    width: 100%;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .publish-btn:hover { background: #d4ff3d; transform: translateY(-1px); }
  .publish-btn:active { transform: translateY(0); }
  .publish-btn:disabled { background: #2a2a2a; color: var(--muted); cursor: not-allowed; transform: none; }

  .status {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    display: none;
    border: 1px solid transparent;
  }

  .status.show { display: block; }
  .status.loading { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--muted); }
  .status.success { background: var(--accent-dim); border-color: rgba(200,241,53,0.3); color: var(--accent); }
  .status.error { background: rgba(255,77,77,0.08); border-color: rgba(255,77,77,0.3); color: var(--error); }

  .live-url {
    display: none;
    margin-top: 12px;
    padding: 12px 16px;
    background: var(--accent-dim);
    border: 1px solid rgba(200,241,53,0.25);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    word-break: break-all;
  }

  .live-url.show { display: block; }
  .live-url a { color: var(--accent); text-decoration: underline; }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid #0a0a0a;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .hint { font-size: 11px; color: #444; font-family: 'DM Mono', monospace; margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">Mindlink Systems</div>
    <h1>Artifact <span>Publisher</span></h1>
    <div class="subtitle">Claude → GitHub → Vercel → Live</div>
  </div>

  <div class="card">
    <div class="card-label">GitHub Config</div>
    <div class="row">
      <div class="field">
        <label>GitHub Username</label>
        <input type="text" id="username" value="Rdall11" />
      </div>
      <div class="field">
        <label>Repository Name</label>
        <input type="text" id="repo" value="Mindlink-resources.-" />
      </div>
    </div>
    <div class="field">
      <label>Personal Access Token</label>
      <div class="token-wrap">
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
        <button class="token-toggle" onclick="toggleToken()">Show</button>
      </div>
      <div class="hint">Your token is never stored — it stays in this session only.</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Artifact Details</div>
    <div class="field">
      <label>Tool Name (becomes the URL path)</label>
      <input type="text" id="toolname" placeholder="roi-calculator" />
      <div class="hint">e.g. "lead-qualifier" → tools.mindlinksystems.ai/lead-qualifier</div>
    </div>
    <div class="field">
      <label>HTML Code</label>
      <textarea id="html" placeholder="Paste your Claude artifact HTML here..."></textarea>
    </div>
    <button class="publish-btn" onclick="publish()" id="publishBtn">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">↑ Publish to Vercel</span>
    </button>
    <div class="status" id="status"></div>
    <div class="live-url" id="liveUrl"></div>
  </div>
</div>

<script>
  function toggleToken() {
    const inp = document.getElementById('token');
    const btn = document.querySelector('.token-toggle');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
  }

  function setStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = `status show ${type}`;
    el.textContent = msg;
  }

  function setLoading(val) {
    document.getElementById('publishBtn').disabled = val;
    document.getElementById('spinner').style.display = val ? 'block' : 'none';
    document.getElementById('btnText').textContent = val ? 'Publishing...' : '↑ Publish to Vercel';
  }

  async function publish() {
    const username = document.getElementById('username').value.trim();
    const repo = document.getElementById('repo').value.trim();
    const token = document.getElementById('token').value.trim();
    const toolname = document.getElementById('toolname').value.trim().toLowerCase().replace(/\s+/g, '-');
    const html = document.getElementById('html').value.trim();
    const liveUrlEl = document.getElementById('liveUrl');

    liveUrlEl.className = 'live-url';

    if (!username || !repo || !token || !toolname || !html) {
      setStatus('error', '✕ Please fill in all fields before publishing.');
      return;
    }

    setLoading(true);
    setStatus('loading', '⟳ Connecting to GitHub...');

    const path = `${toolname}/index.html`;
    const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;

    try {
      let sha = null;
      const checkRes = await fetch(apiUrl, {
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json'
        }
      });

      if (checkRes.ok) {
        const existing = await checkRes.json();
        sha = existing.sha;
        setStatus('loading', '⟳ File exists — updating...');
      } else {
        setStatus('loading', '⟳ Creating new tool folder...');
      }

      const encoded = btoa(unescape(encodeURIComponent(html)));

      const body = {
        message: sha ? `Update ${toolname}` : `Add ${toolname}`,
        content: encoded,
        ...(sha && { sha })
      };

      setStatus('loading', '⟳ Pushing to GitHub...');

      const pushRes = await fetch(apiUrl, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (!pushRes.ok) {
        const err = await pushRes.json();
        throw new Error(err.message || 'GitHub API error');
      }

      setStatus('success', `✓ Published! Vercel is deploying — live within 30 seconds.`);
      const liveLink = `https://tools.mindlinksystems.ai/${toolname}`;
      liveUrlEl.className = 'live-url show';
      liveUrlEl.innerHTML = `🔗 <a href="${liveLink}" target="_blank">${liveLink}</a>`;

    } catch (err) {
      setStatus('error', `✕ Error: ${err.message}`);
    } finally {
      setLoading(false);
    }
  }
</script>
</body>
</html>
